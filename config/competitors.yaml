competitors:
  - id: slack
    name: "Slack"
    enabled: true
    sources:
      - type: rss
        url: "https://docs.slack.dev/changelog/rss.xml"
      - type: rss
        url: "https://docs.slack.dev/changelog/atom.xml"
      - type: http
        url: "https://docs.slack.dev/changelog"
        name: "Developer Changelog"

  - id: stripe
    name: "Stripe"
    enabled: true
    sources:
      - type: rss
        url: "https://stripe.com/blog/feed.rss"
      - type: http
        url: "https://docs.stripe.com/changelog"
        name: "Product Changelog"
      - type: http
        url: "https://docs.stripe.com/upgrades"
        name: "API Upgrades"

  - id: linear
    name: "Linear"
    enabled: true
    sources:
      - type: http
        url: "https://linear.app/changelog"
        name: "Product Changelog"
      - type: http
        url: "https://linear.app/blog"
        name: "Engineering Blog"