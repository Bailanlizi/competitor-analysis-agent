interval_minutes: 60
cold_start_days: 30
timezone: "Asia/Shanghai"
feishu_webhook: "https://open.feishu.cn/open-apis/bot/v2/hook/797b85b5-a328-4cfc-8fc2-93d80b2ed5f6"
dingtalk_webhook: ""

llm:
  provider: qwen
  model: qwen3-max

search:
  enabled: false
  provider: "serpapi"
  api_key_env: "SEARCH_API_KEY"
  keywords:
    - "competitor product update"
  max_results: 5

